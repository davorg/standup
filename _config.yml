# Site
title: Stand-Up UK
description: Reviews, news and picks from the Edinburgh Fringe and beyond.
url: https://standup.co.uk
baseurl: ""
lang: en-GB
timezone: Europe/London

# URLs
permalink: /:year/:month/:day/:title/

# Theme (robust, accessible, SEO-friendly)
remote_theme: mmistakes/minimal-mistakes@4.26.1
# theme: null  # keep null when using remote_theme

# Minimal Mistakes basics
minimal_mistakes_skin: "default"    # try "air", "contrast", "dark" etc.
logo: /assets/images/comedian.png   # supply a 1200x630 image for social shares
repository: davorg/standup.co.uk    # your repo (for github-metadata)

# Plugins (great on GitHub Pages when you build via Actions)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-archives
  - jekyll-paginate-v2
  - jekyll-include-cache

# Pagination (jekyll-paginate-v2)
pagination:
  enabled: true
  per_page: 10
  title: ":title — page :num"
  trail:
    before: 2
    after: 2
  permalink: "/page/:num/"

# Archives (nice tag/category pages)
jekyll-archives:
  enabled:
    - categories
    - tags
    - year
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
    year: archive
  permalinks:
    category: /category/:name/
    tag: /tag/:name/
    year: /:year/

# Defaults for posts (less front matter to type)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author: "UK Stand-Up"
      read_time: true
      comments: false
      share: true
      related: true
      classes: wide
      header:
        overlay_image: /assets/images/social-default.jpg   # 1200x630 recommended
        overlay_filter: 0.4

# Social + Analytics
social:
  name: UK Stand-Up
  links:
    - https://www.instagram.com/standupcouk/
    - https://bsky.app/profile/standupcouk.bsky.social
    - https://tiktok.com/@standup.co.uk

footer:
  links:
    - label: Instagram
      icon: "fab fa-fw fa-instagram"
      url: https://www.instagram.com/standupcouk/
    - label: Bluesky
      icon: "fab fa-fw fa-bluesky"
      url: https://bsky.app/profile/standupcouk.bsky.social
    - label: TikTok
      icon: "fab fa-fw fa-tiktok"
      url: https://tiktok.com/@standup.co.uk
    - label: About
      icon: "fas fa-fw fa-info-circle"
      url: /about/
    - label: Team
      icon: "fas fa-fw fa-users"
      url: /team/
    - label: Contact
      icon: "fas fa-fw fa-envelope"
      url: /contact/

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-9B2DNH3X51"
    anonymize_ip: true

# Markdown + Sass
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
sass:
  style: compressed

# Build hygiene
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - package.json
  - package-lock.json

strict_front_matter: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      show_date: true
      read_time: true 
      author_profile: 1
